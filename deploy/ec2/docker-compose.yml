# RSG AI on a tiny EC2 box: agent container + Caddy for automatic HTTPS.
# Lives at /opt/rsg-ai/docker-compose.yml on the instance; run via run.sh,
# which exports IMAGE, DOMAIN, and RSG_AI_API_KEY (from SSM) before compose.
services:
  rsg-ai:
    image: ${IMAGE}
    restart: unless-stopped
    environment:
      PORT: "8787"
      AWS_REGION: us-west-1
      RSG_AI_API_KEY: ${RSG_AI_API_KEY}
    ports:
      - "127.0.0.1:8787:8787"   # host-local only (SG admits 80/443); for health checks + on-box debugging

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - /opt/rsg-ai/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
