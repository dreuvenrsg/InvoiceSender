AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  RSG AI agent API on ECS Fargate behind an ALB. Long-lived SSE streams
  (agent turns can run minutes), credentials resolved from SSM at runtime.

Parameters:
  ImageUri:
    Type: String
    Description: ECR image URI (e.g. <acct>.dkr.ecr.us-west-1.amazonaws.com/rsg-ai:<tag>)
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Public subnets (>=2 AZs) for the ALB and tasks
  CertificateArn:
    Type: String
    Default: ''
    Description: ACM cert ARN for HTTPS (e.g. rsg-ai.rsgsecurity.com). Empty = HTTP only (dev bring-up).
  DesiredCount:
    Type: Number
    Default: 1
  RsgAiModel:
    Type: String
    Default: claude-opus-4-8
    AllowedValues: [claude-opus-4-8, claude-fable-5]

Conditions:
  HasCert: !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/rsg-ai
      RetentionInDays: 180

  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: rsg-ai

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RSG AI ALB - public HTTP/HTTPS (API enforces bearer auth)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RSG AI service - traffic from the ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8787
          ToPort: 8787
          SourceSecurityGroupId: !Ref AlbSecurityGroup

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: rsg-ai
      Scheme: internet-facing
      Type: application
      Subnets: !Ref SubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]
      LoadBalancerAttributes:
        # Agent turns can sit minutes inside one tool call with no SSE bytes
        # flowing (e.g. paginating thousands of QBO bills) - keep idle high.
        - { Key: idle_timeout.timeout_seconds, Value: '900' }

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: rsg-ai
      VpcId: !Ref VpcId
      Port: 8787
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      TargetGroupAttributes:
        - { Key: deregistration_delay.timeout_seconds, Value: '120' }

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - !If
          - HasCert
          - Type: redirect
            RedirectConfig: { Protocol: HTTPS, Port: '443', StatusCode: HTTP_301 }
          - Type: forward
            TargetGroupArn: !Ref TargetGroup

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasCert
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates: [{ CertificateArn: !Ref CertificateArn }]
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  ExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: inject-api-key-secret
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: ssm:GetParameters
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rsg-ai/prod/api-key

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: rsg-ai-runtime
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # Anthropic + Fulcrum keys, QBO client creds
              - Effect: Allow
                Action: ssm:GetParameter
                Resource:
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rsg-ai/prod/*
                  - !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/qbo-invoice-sender/*
              # QBO refresh-token rotation (shared with the invoice Lambda)
              - Effect: Allow
                Action: ssm:PutParameter
                Resource: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/qbo-invoice-sender/prod/refresh-token

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: rsg-ai
      RequiresCompatibilities: [FARGATE]
      NetworkMode: awsvpc
      Cpu: '512'
      Memory: '1024'
      ExecutionRoleArn: !GetAtt ExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: rsg-ai
          Image: !Ref ImageUri
          PortMappings: [{ ContainerPort: 8787, Protocol: tcp }]
          Environment:
            - { Name: PORT, Value: '8787' }
            - { Name: AWS_REGION, Value: !Ref AWS::Region }
            - { Name: RSG_AI_MODEL, Value: !Ref RsgAiModel }
          Secrets:
            - Name: RSG_AI_API_KEY
              ValueFrom: !Sub arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/rsg-ai/prod/api-key
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: rsg-ai

  Service:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: rsg-ai
      Cluster: !Ref Cluster
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Ref SubnetIds
          SecurityGroups: [!Ref ServiceSecurityGroup]
      LoadBalancers:
        - ContainerName: rsg-ai
          ContainerPort: 8787
          TargetGroupArn: !Ref TargetGroup

Outputs:
  AlbDnsName:
    Value: !GetAtt LoadBalancer.DNSName
  ServiceUrl:
    Description: Set this (or the CNAME pointing at it) as RSG_AI_URL in Vercel
    Value: !If
      - HasCert
      - !Sub https://${LoadBalancer.DNSName}
      - !Sub http://${LoadBalancer.DNSName}
